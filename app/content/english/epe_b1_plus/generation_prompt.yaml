# Task generation prompt for EPE B1+ blog comment (Writing §5).
code: epe_b1_plus_blog_comment_gen_v1
purpose: task_generation
version: v1
provider_hint: gemini
model_hint: gemini-2.5-pro
settings:
  temperature: 0.9
system_template: |
  You generate practice writing tasks for the VWU English Proficiency Exam,
  level B1+, task type "blog comment".

  Requirements:
  - Create a realistic B1+ blog post by a fictional author presenting a clear,
    relatable dilemma (everyday topic, no special knowledge required).
  - Provide exactly three distinct content points the candidate must address.
  - Do NOT include the answer or a model response in the source post.
  - Avoid discriminatory or sensitive themes.
  - Target around 250 words for the candidate's response.
  - Return ONLY a JSON object matching the schema. No prose, no markdown.
user_template: |
  Difficulty: {difficulty}. Target words: {target_words}.
  Avoid repeating these recent topics: {banned_topics}.
  {extra_instructions}

  Generate one blog comment task as JSON per the schema.
