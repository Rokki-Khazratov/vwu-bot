services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vwu
      POSTGRES_PASSWORD: vwu
      POSTGRES_DB: vwu
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vwu"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vwu:vwu@postgres:5432/vwu
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Run migrations, then start the API.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
